services:
  - type: web
    name: production-scheduler-backend
    env: node
    buildCommand: cd scheduler-backend && npm install
    startCommand: cd scheduler-backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
    # Increase timeout to 5 minutes for long-running schedules
    healthCheckPath: /
    # Set higher limits for memory and CPU

  - type: cron
    name: schedule-optimizer
    env: node
    buildCommand: cd scheduler-backend && npm install
    startCommand: cd scheduler-backend && node optimizer-cron.js
    schedule: "0 1 * * 1-5"
    envVars:
      - key: SERVER_URL
        value: https://production-scheduler-backend-aepw.onrender.com
      - key: NODE_ENV
        value: production
      # All tuning knobs below are set via the Render dashboard so changes take
      # effect on the next trigger without needing a redeploy.
      #
      #   ANTHROPIC_API_KEY          — required (never commit the key)
      #   OPTIMIZER_ITERATIONS       — default 25; set to 100+ for deep runs
      #   OPTIMIZER_HORIZON          — default 3 (months)
      #   OPTIMIZER_START_OFFSET_DAYS — default 0 (today); set to 3 for deep runs (lead prep time)
      #   OPTIMIZER_RECIPIENTS       — comma-separated emails; default Danny only
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPTIMIZER_ITERATIONS
        sync: false
      - key: OPTIMIZER_START_OFFSET_DAYS
        sync: false
      - key: OPTIMIZER_RECIPIENTS
        sync: false
