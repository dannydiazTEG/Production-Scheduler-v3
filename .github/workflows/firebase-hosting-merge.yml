name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'scheduler-frontend/**'
      - '.github/workflows/firebase-hosting-merge.yml'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        working-directory: ./scheduler-frontend
        run: npm ci

      - name: Build
        working-directory: ./scheduler-frontend
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEGPRODUCTIONDB }}'
          channelId: live
          projectId: tegproductiondb
          entryPoint: ./scheduler-frontend
